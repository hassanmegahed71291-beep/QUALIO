<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>بوت التدريب الذكي</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .header {
      background: #2c3e50;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }
    .chatbox {
      width: 80%;
      margin: 20px auto;
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      min-height: 400px;
      overflow-y: auto;
    }
    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
    }
    .bot {
      background: #e8f6ff;
      text-align: left;
    }
    .user {
      background: #dfffd8;
      text-align: right;
    }
    .input-area {
      width: 80%;
      margin: 10px auto;
      display: flex;
    }
    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .input-area button {
      padding: 10px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 6px;
      background: #2c3e50;
      color: #fff;
      cursor: pointer;
    }
    .training-image {
      max-width: 100%;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div class="header">
    بوت التدريب الذكي – Hassan Megahed مدير الجودة AQL
  </div>

  <div class="chatbox" id="chatbox">
    <div class="message bot">
      مرحبًا بكم في بوت التدريب الذكي ✨<br>
      أنا <b>Hassan Megahed – مدير الجودة AQL</b>، يسعدني وجودكم هنا.<br>
      هدفنا معًا هو رفع مستوى الجودة وتحقيق أفضل أداء للفريق.<br><br>
      من فضلك اكتب اسمك لتسجيل حضورك 👇
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="اكتب اسمك هنا...">
    <button onclick="sendMessage()">إرسال</button>
  </div>

  <script>
    let userName = "";

    function sendMessage() {
      const input = document.getElementById("userInput");
      const chatbox = document.getElementById("chatbox");
      const message = input.value.trim();

      if (message !== "") {
        if (userName === "") {
          userName = message;
          chatbox.innerHTML += `
            <div class="message user">${message}</div>
            <div class="message bot">أهلاً يا ${userName} 👋، خلينا نبدأ التدريب معًا.</div>

            <div class="message bot">📌 أول خطوة: مراجعة الجودة النهائية.</div>
            <div class="message bot">النظافة تعكس احترافك ✨</div>
            <div class="message bot">الفوضى تؤثر سلبًا على الأداء ❌</div>

            <div class="message bot">📏 مقاسات البنطلون الأساسية:</div>
            <img src="waist.jpg" class="training-image" alt="Waist">
            <div class="message bot">قياس الوسط (Waist)</div>

            <img src="hip.jpg" class="training-image" alt="Hip">
            <div class="message bot">قياس الحوض (Hip)</div>

            <img src="front_rise.jpg" class="training-image" alt="Front Rise">
            <div class="message bot">الارتفاع الأمامي (Front Rise)</div>

            <img src="back_rise.jpg" class="training-image" alt="Back Rise">
            <div class="message bot">الارتفاع الخلفي (Back Rise)</div>

            <img src="thigh.jpg" class="training-image" alt="Thigh">
            <div class="message bot">قياس الفخذ (Thigh)</div>

            <img src="inseam.jpg" class="training-image" alt="Inseam">
            <div class="message bot">الطول الداخلي (Inseam)</div>

            <img src="hem.jpg" class="training-image" alt="Hem">
            <div class="message bot">عرض نهاية الرجل (Hem)</div>

            <div class="message bot">💡 تذكّر: الإتقان هو طريق الجودة، وكل تفصيلة صغيرة تصنع فرقًا كبيرًا.</div>
          `;
        } else {
          chatbox.innerHTML += `<div class="message user">${message}</div>`;
          chatbox.innerHTML += `<div class="message bot">تمام يا ${userName}، هنكمل التدريب خطوة بخطوة ✨</div>`;
        }
        input.value = "";
        chatbox.scrollTop = chatbox.scrollHeight;
      }
    }
  </script>
</body>
</html>
