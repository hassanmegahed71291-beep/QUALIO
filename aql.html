<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>AQL Calculator | QUALIO</title>
<style>
body{font-family:Arial;margin:0;background:#0b1220;color:#fff}
header{padding:20px;background:#111827}
main{max-width:900px;margin:auto;padding:30px}
.card{background:#1f2937;padding:20px;border-radius:14px}
label,input,select{display:block;width:100%;margin:10px 0}
input,select{padding:10px;border-radius:8px;border:none}
button{padding:12px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px}
.result{margin-top:20px;padding:15px;background:#0f172a;border-radius:10px}
</style></head><body>
<header><h2>QUALIO | AQL Calculator</h2></header>
<main><div class='card'>
<h1>AQL Sample Size</h1>
<label>Lot Size</label><input id='lot' type='number' value='1200'>
<label>AQL Level</label><select id='aql'><option>1.0</option><option>1.5</option><option selected>2.5</option><option>4.0</option></select>
<button onclick='calc()'>Calculate</button>
<div class='result' id='r'>Sample Size: 80<br>Accept: 5<br>Reject: 6</div>
</div></main>
<script>
function calc(){let l=+lot.value;let s=l<500?50:l<3200?80:125;r.innerHTML=`Sample Size: ${s}<br>Accept: 5<br>Reject: 6<br>AQL: ${aql.value}`;}
</script></body></html>
